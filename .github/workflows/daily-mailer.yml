name: Daily Java Tips Mailer

on:
  schedule:
    - cron: '30 2 * * *'   # Runs daily at 2:30 AM UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  send-tips:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build fat JAR with ShadowJar
        run: ./gradlew clean shadowJar --no-daemon

      - name: Run Java Tips Mailer
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:     ${{ secrets.RECIPIENT_EMAIL }}
        run: java -jar build/libs/java-tips-mailer-1.0.0.jar

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-tips-mailer
          path: build/libs/java-tips-mailer-1.0.0.jar